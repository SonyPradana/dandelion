<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syarat dan Ketentuan Penggunaan</title>
    <link rel="stylesheet" href="./popup.css" />
    <link rel="stylesheet" href="./components/KeywordList.css" />
    <link rel="stylesheet" href="./components/KeyValueList.css" />
    <link rel="stylesheet" href="./components/ProfileManager.css" />
  </head>
  <body>
    <div class="container">
      <div class="tab-nav">
        <button class="tab-button active" data-tab="agreement">Persetujuan</button>
        <button class="tab-button" data-tab="config">Konfigurasi</button>
        <button class="tab-button" data-tab="produktifitas">Produktivitas</button>
      </div>

      <div id="agreement" class="tab-content active"></div>

      <div id="config" class="tab-content">
        <div id="config-wrapper">
          <div class="header">
            <h1>Konfigurasi</h1>
          </div>
          <div class="content">
            <div class="form-group">
              <label>Profile</label>
              <div id="profile-manager-container"></div>
            </div>

            <details class="config-group" open>
              <summary>Form Skrining</summary>

              <div class="form-group">
                <label for="form-skrining-url">URL</label>
                <input
                  type="text"
                  id="form-skrining-url"
                  placeholder="Masukkan pola URL form skrining"
                />
              </div>

              <div class="form-group">
                <div class="checkbox-item">
                  <input type="checkbox" id="form-skrining-scroll-to-button" />
                  <label for="form-skrining-scroll-to-button"
                    >Scroll ke tombol setelah selesai</label
                  >
                </div>
              </div>

              <div class="form-group">
                <label for="form-skrining-radio-keywords-input">Kata Kunci Tombol Radio</label>
                <input
                  type="text"
                  id="form-skrining-radio-keywords-input"
                  placeholder="Value pisahkan dengan ;"
                />
                <div class="keyword-list-container">
                  <div class="keyword-list" id="form-skrining-radio-keywords-list"></div>
                  <div class="keyword-input-container">
                    <input
                      type="text"
                      id="form-skrining-radio-keywords-add-input"
                      placeholder="Tambah kata kunci..."
                    />
                    <button type="button" class="btn-add" id="form-skrining-radio-keywords-add">
                      +
                    </button>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label for="form-skrining-dropdown-keywords-input">Kata Kunci Dropdown</label>
                <input
                  type="text"
                  id="form-skrining-dropdown-keywords-input"
                  placeholder="Value pisahkan dengan ;"
                />
                <div class="keyword-list-container">
                  <div class="keyword-list" id="form-skrining-dropdown-keywords-list"></div>
                  <div class="keyword-input-container">
                    <input
                      type="text"
                      id="form-skrining-dropdown-keywords-add-input"
                      placeholder="Tambah kata kunci..."
                    />
                    <button type="button" class="btn-add" id="form-skrining-dropdown-keywords-add">
                      +
                    </button>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label for="form-skrining-excludes">Data dikecualikan</label>
                <input
                  type="text"
                  id="form-skrining-excludes"
                  placeholder="Kecualikan atau lewati survei"
                />
              </div>

              <div class="form-group">
                <label>Nilai Tersemat</label>
                <div id="form-skrining-pinned-values"></div>
              </div>
            </details>

            <details class="config-group" open>
              <summary>Form Tidak Periksa</summary>

              <div class="form-group">
                <label for="not-checked-url">URL</label>
                <input
                  type="text"
                  id="not-checked-url"
                  placeholder="Masukkan pola URL (pemeriksaan)"
                />
              </div>

              <div class="form-group">
                <label for="not-checked-list-input">Daftar Master 'Tidak Periksa'</label>
                <input
                  type="text"
                  id="not-checked-list-input"
                  placeholder="ID baris pisahkan dengan ;"
                />
                <div class="keyword-list-container">
                  <div class="keyword-list" id="not-checked-list-container"></div>
                  <div class="keyword-input-container">
                    <input
                      type="text"
                      id="not-checked-list-add-input"
                      placeholder="Tambah ID baris (rowfrm...)"
                    />
                    <button type="button" class="btn-add" id="not-checked-list-add">+</button>
                  </div>
                </div>
              </div>

              <div class="delay-settings-grid">
                <div class="form-group-sm">
                  <label for="not-checked-automation-delay">Jeda Awal</label>
                  <input
                    type="number"
                    id="not-checked-automation-delay"
                    placeholder="2000"
                    min="500"
                    max="10000"
                  />
                </div>
                <div class="form-group-sm">
                  <label for="not-checked-item-delay">Jeda Item</label>
                  <input
                    type="number"
                    id="not-checked-item-delay"
                    placeholder="1000"
                    min="100"
                    max="5000"
                  />
                </div>
                <div class="form-group-sm">
                  <label for="not-checked-reload-delay">Jeda Reload</label>
                  <input
                    type="number"
                    id="not-checked-reload-delay"
                    placeholder="3000"
                    min="500"
                    max="15000"
                  />
                </div>
              </div>
            </details>

            <details class="config-group">
              <summary>Skrining</summary>

              <div class="form-group">
                <label for="skrining-url">URL</label>
                <input type="text" id="skrining-url" placeholder="Masukkan pola URL skrining" />
              </div>
            </details>

            <button id="save-config-btn" class="btn">Simpan</button>
            <div class="action-links">
              <a href="#" id="export-link">Ekspor</a>
              <a href="#" id="import-link">Impor</a>
            </div>
            <a href="#" id="open-full-page" class="open-page-link">⚙️ Konfigurasi Lengkap</a>
            <input type="file" id="import-file-input" style="display: none" accept=".json" />
          </div>
        </div>
      </div>

      <div id="produktifitas" class="tab-content">
        <div class="header">
          <h1>Produktifitas</h1>
        </div>
        <div class="content" id="produktifitas-content"></div>
        <div class="content" style="padding-top: 0">
          <a href="#" id="prod-open-config" class="open-page-link">⚙️ Konfigurasi Lanjutan</a>
        </div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
