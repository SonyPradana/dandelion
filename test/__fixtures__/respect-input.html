<div id="q_radio_empty" data-name="q_radio_empty">
  <fieldset class="sd-selectbase">
    <div class="sd-item sd-radio">
      <label class="sd-selectbase__label">
        <input type="radio" name="radio_empty" value="a">
        <span class="sd-item__control-label">
          <span class="sv-string-viewer">Opsi A</span>
        </span>
      </label>
    </div>
    <div class="sd-item sd-radio">
      <label class="sd-selectbase__label">
        <input type="radio" name="radio_empty" value="b">
        <span class="sd-item__control-label">
          <span class="sv-string-viewer">Opsi B</span>
        </span>
      </label>
    </div>
  </fieldset>
</div>

<div id="q_radio_filled" data-name="q_radio_filled">
  <fieldset class="sd-selectbase">
    <div class="sd-item sd-radio sd-item--checked">
      <label class="sd-selectbase__label">
        <input type="radio" name="radio_filled" value="a" checked>
        <span class="sd-item__control-label">
          <span class="sv-string-viewer">Opsi A</span>
        </span>
      </label>
    </div>
    <div class="sd-item sd-radio">
      <label class="sd-selectbase__label">
        <input type="radio" name="radio_filled" value="b">
        <span class="sd-item__control-label">
          <span class="sv-string-viewer">Opsi B</span>
        </span>
      </label>
    </div>
  </fieldset>
</div>

</div>

</div>
